<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Previsão de Desempenho Estudantil</title>
</head>
<body>
    <h2>Sistema de Previsão de Desempenho Estudantil</h2>

    <form action="/" method="POST">

        <label for="absences">Número de faltas:</label>
        <input type="number" id="absences" name="absences" min="0" max="93" required>

        <label for="failures">Número de reprovações anteriores:</label>
        <select id="failures" name="failures" required>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>

        <label for="goout">Frequência de saídas com amigos (1=muito pouco, 5=muito):</label>
        <select id="goout" name="goout" required>
            <option value="1">1 - Muito Pouco</option>
            <option value="2">2 - Pouco</option>
            <option value="3">3 - Regular</option>
            <option value="4">4 - Bastante</option>
            <option value="5">5 - Muito</option>
        </select>

        <label for="age">Idade:</label>
        <input type="number" id="age" name="age" min="10" max="22" required>

        <label for="freetime">Tempo livre após a escola (1=muito pouco, 5=muito):</label>
        <select id="freetime" name="freetime" required>
            <option value="1">1 - Muito Pouco</option>
            <option value="2">2 - Pouco</option>
            <option value="3">3 - Regular</option>
            <option value="4">4 - Bastante</option>
            <option value="5">5 - Muito</option>
        </select>

        <label for="health">Estado de saúde atual (1=muito ruim, 5=muito bom):</label>
        <select id="health" name="health" required>
            <option value="1">1 - Muito Ruim</option>
            <option value="2">2 - Ruim</option>
            <option value="3">3 - Regular</option>
            <option value="4">4 - Bom</option>
            <option value="5">5 - Muito Bom</option>
        </select>

        <button type="submit">🔍 Prever Aprovação</button>
    </form>

    {% if predicao is not none %}
        <div class="resultado">
            <h3>Resultado da Predição: {{ predicao }}</h3>
        </div>

        <div class="grafico">
            {{ grafico|safe }}
        </div>
    {% endif %}

</body>
</html>
